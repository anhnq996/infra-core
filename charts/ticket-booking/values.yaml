# ============================================
# Ticket Booking Helm Chart - Values
# ============================================

api:
  image:
    repository: anhnq996/ticket-booking-backend
    tag: latest
    pullPolicy: Always

  replicas: 1

  service:
    type: ClusterIP
    port: 8080

  ingress:
    host: api-booking.anhnq.io.vn
    certResolver: letsencrypt
    entrypoint: websecure

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  env:
    PORT: "8080"
    ALLOWED_ORIGIN: "https://booking.anhnq.io.vn"
    AUTO_MIGRATE: "true"

web:
  image:
    repository: anhnq996/ticket-booking-frontend
    tag: latest
    pullPolicy: Always

  replicas: 1

  service:
    type: ClusterIP
    port: 3001

  ingress:
    host: booking.anhnq.io.vn
    certResolver: letsencrypt
    entrypoint: websecure

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  env:
    NODE_ENV: production
    PORT: "3001"
    HOSTNAME: "0.0.0.0"
    API_BASE_URL: "http://ticket-booking-api.ticket-booking.svc.cluster.local:8080/api/v1"
    NEXT_PUBLIC_API_BASE_URL: "https://api-booking.anhnq.io.vn/api/v1"

existingSecrets:
  api: ticket-booking-api-secret
